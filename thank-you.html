<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you</title>
  <style>
    body { margin: 0; font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: #f7faf7; color: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .thank-you { max-width: 520px; padding: 32px; background: #ffffff; border: 1px solid #ddd; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .thank-you h1 { margin-bottom: 16px; color: #3a6b5e; }
    .thank-you p { margin-bottom: 24px; line-height: 1.6; }
    .thank-you a { display: inline-block; padding: 12px 24px; background: #3a6b5e; color: #fff; text-decoration: none; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="thank-you">
    <h1>Thank you!</h1>
    <p>Your message has been received. We will be in touch soon.</p>
    <a href="/">Return to the site</a>
  </div>
</body>
</html>
